name: PR Validation

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR to save CI minutes.
concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Default permissions are read-only; only the workflow specifies the
# narrow write permission it actually needs.
permissions:
  contents: read

jobs:
  validate-changed-content:
    name: Fast Changed-File Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate changed files
        # Bind changed-file detection to the PR base commit; getChangedFiles()
        # fails closed in CI if the base cannot be established.
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: pnpm run validate:changed

  validate-editorial-full:
    name: Full-Catalog Editorial (baseline-gated)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Cross-entry rules (e.g. repeated paragraphs against unchanged entries)
      # and baseline freshness are only visible in full-catalog mode, so run it
      # pre-merge rather than only in post-merge CI. Pre-existing debt is
      # suppressed by the committed finding-level baseline; new findings fail.
      - name: Full-catalog editorial validation
        run: pnpm run validate:editorial:all

  validate-global-invariants:
    name: Global Invariants
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Path validation
        run: pnpm run validate:paths
      - name: Reference validation
        run: pnpm run validate:refs
      - name: Duplicate ID check
        run: pnpm run check:duplicates

  unit-tests:
    name: Unit Tests (including script/schema changes)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run unit tests
        run: pnpm test

  validate-data-contract:
    name: Validate Generated Data Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate data
        run: pnpm run generate
      - name: Generate search index
        run: pnpm run generate:search
      - name: Validate data contract
        run: pnpm run validate:data

  check-links:
    name: Check New/Modified Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Link check (SSRF-hardened)
        env:
          # Cap per-host amplification; reject private/loopback IPs by default.
          LINK_CHECK_MAX_URLS: '500'
          LINK_CHECK_MAX_URLS_PER_HOST: '100'
          # Retry transient failures with backoff; known rate-limited hosts
          # (GitHub, X) get a higher per-host budget so a sample is still
          # checked. Rate limits / transient errors are soft warnings, not
          # CI failures — only confirmed 404/410 (and DNS/SSRF) fail CI.
          LINK_CHECK_RETRIES: '2'
          LINK_CHECK_BACKOFF_MS: '400'
          LINK_CHECK_RATE_LIMIT_CAP: '40'
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: pnpm run validate:links
