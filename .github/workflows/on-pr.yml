name: PR Validation

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR to save CI minutes.
concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Default permissions are read-only; only the workflow specifies the
# narrow write permission it actually needs.
permissions:
  contents: read

jobs:
  validate-changed-content:
    name: Fast Changed-File Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate changed files
        run: pnpm run validate:changed

  validate-global-invariants:
    name: Global Invariants
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Path validation
        run: pnpm run validate:paths
      - name: Reference validation
        run: pnpm run validate:refs
      - name: Duplicate ID check
        run: pnpm run check:duplicates

  validate-data-contract:
    name: Validate Generated Data Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate data
        run: pnpm run generate
      - name: Generate search index
        run: pnpm run generate:search
      - name: Validate data contract
        run: pnpm run validate:data

  check-links:
    name: Check New/Modified Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Link check (SSRF-hardened)
        env:
          # Cap per-host amplification; reject private/loopback IPs by default.
          LINK_CHECK_MAX_URLS: '500'
          LINK_CHECK_MAX_URLS_PER_HOST: '100'
          # Retry transient failures with backoff; known rate-limited hosts
          # (GitHub, X) get a higher per-host budget so a sample is still
          # checked. Rate limits / transient errors are soft warnings, not
          # CI failures — only confirmed 404/410 (and DNS/SSRF) fail CI.
          LINK_CHECK_RETRIES: '2'
          LINK_CHECK_BACKOFF_MS: '400'
          LINK_CHECK_RATE_LIMIT_CAP: '40'
        run: pnpm run validate:links
