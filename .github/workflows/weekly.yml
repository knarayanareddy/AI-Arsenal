name: Weekly Refresh

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

concurrency:
  group: weekly-refresh
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  weekly-maintenance-pr:
    name: Weekly Metrics, Links, and Trending PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Update GitHub stars
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm run update:stars
      - name: Recalculate trending scores
        run: pnpm run update:trending
      - name: Generate data layer
        run: pnpm run generate:all
      - name: Draft weekly trending
        run: node scripts/draft-trending.js
      - name: Check all links (non-blocking)
        env:
          # The current catalog contains ~1.4k unique URLs; keep this above
          # repository scale while retaining the per-host amplification cap.
          LINK_CHECK_MAX_URLS: '2000'
          LINK_CHECK_MAX_URLS_PER_HOST: '10'
        continue-on-error: true
        run: pnpm run check:links
      - name: File broken-link issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BROKEN_LINK_ISSUE_LIMIT: '10'
        run: node scripts/create-link-issues.js
      - name: Open batched weekly PR
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          branch: bot/weekly-refresh
          delete-branch: true
          commit-message: "chore(weekly): refresh metrics and trending"
          title: "chore(weekly): refresh metrics and trending"
          body: |
            Weekly maintenance refresh. This is batched into a PR to avoid direct generated-file commits on main.
          labels: automation, weekly-refresh
          add-paths: |
            content/**/*.md
            data/*.json
            CONTEXT.md
