name: Release

# Manual dispatch: cut a release tag on main and publish a generated
# CHANGELOG section to GitHub Releases.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver tag (e.g. v1.2.3). Leave empty for auto-bump from main.'
        required: false
        type: string
      notes:
        description: 'Optional release notes (will be prepended to the auto-generated changelog).'
        required: false
        type: string

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  cut-release:
    name: Cut Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - name: Resolve tag
        id: tag
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: node scripts/resolve-release-tag.js
      - name: Generate changelog
        run: pnpm install --frozen-lockfile && node scripts/generate-changelog.js
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          body: |
            ${{ inputs.notes }}
            See CHANGELOG.md for the full project history.
