name: Monthly Digest & Snapshot

on:
  schedule:
    - cron: '0 10 1 * *'
  workflow_dispatch:

concurrency:
  group: monthly-digest
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  monthly-maintenance-pr:
    name: Monthly Digest, Stale Report, and Stats PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate data
        run: pnpm run generate
      - name: Create monthly digest draft
        run: node scripts/create-monthly-digest.js
      - name: Check stale entries
        run: pnpm run check:stale
      - name: Generate stats
        run: pnpm run generate:stats
      - name: Open batched monthly PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/monthly-digest
          delete-branch: true
          commit-message: "chore(monthly): create digest and stale report"
          title: "chore(monthly): create digest and stale report"
          body: |
            Monthly maintenance PR with digest draft, stale report, and statistics.
          labels: automation, monthly-digest
          add-paths: |
            content/digests/**
            data/stats.json
            data/stale-report.json
