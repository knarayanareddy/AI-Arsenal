name: OSSF Scorecard

# Public OSSF Scorecard compliance check. Posts results as SARIF to the
# Security tab and opens an issue on regressions.

on:
  branch_protection_rule:
  schedule:
    - cron: '37 4 * * 1'

concurrency:
  group: scorecard
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 7
