name: Manual Maintenance

# This workflow is operator-only. It does NOT commit back to main.
# Maintenance tasks must always be merged via a PR (see data-refresh.yml,
# weekly.yml, monthly.yml). Direct auto-commits to main were removed for
# security: an attacker who obtains a maintainer PAT and triggers this
# workflow could otherwise push arbitrary content to main with no review.

on:
  workflow_dispatch:
    inputs:
      task:
        description: Maintenance task to run
        required: true
        default: validate
        type: choice
        options:
          - validate
          - generate
          - update-stars
          - check-links
          - draft-trending
          - create-monthly-digest
          - check-stale

concurrency:
  group: manual-${{ github.event.inputs.task }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-task:
    name: Run Manual Task
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate
        if: inputs.task == 'validate'
        run: pnpm run ci
      - name: Generate (no commit)
        if: inputs.task == 'generate'
        run: |
          pnpm run generate:all
          echo "::warning::Generated files are NOT auto-committed. Open a PR with the diff for review."
      - name: Update stars (no commit)
        if: inputs.task == 'update-stars'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm run update:stars
          echo "::warning::Updated stars are NOT auto-committed. Open a PR with the diff for review."
      - name: Check links (changed-only)
        if: inputs.task == 'check-links'
        env:
          LINK_CHECK_MAX_URLS: '500'
          LINK_CHECK_MAX_URLS_PER_HOST: '10'
        run: pnpm run validate:links
      - name: Draft trending (no commit)
        if: inputs.task == 'draft-trending'
        run: |
          pnpm run generate
          node scripts/draft-trending.js
          echo "::warning::Trending draft is NOT auto-committed. Open a PR with the diff for review."
      - name: Create monthly digest draft (no commit)
        if: inputs.task == 'create-monthly-digest'
        run: |
          node scripts/create-monthly-digest.js
          echo "::warning::Monthly digest draft is NOT auto-committed. Open a PR with the diff for review."
      - name: Check stale (no commit)
        if: inputs.task == 'check-stale'
        run: |
          pnpm run check:stale
          echo "Stale report written to data/stale-report.json. Open a PR with the diff for review."
      - name: Upload artifacts for review
        if: inputs.task != 'validate' && inputs.task != 'check-links'
        uses: actions/upload-artifact@v4
        with:
          name: manual-task-${{ inputs.task }}
          path: |
            data/*.json
            content/trending/*.md
            content/digests/**/*.md
            CONTEXT.md
          retention-days: 7
