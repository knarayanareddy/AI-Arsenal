name: Post-Merge Verification

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'schemas/**'
      - 'scripts/**'
      - 'TAXONOMY.md'
      - 'package.json'
      - 'pnpm-lock.yaml'

concurrency:
  group: post-merge-verification-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-generated-state:
    name: Verify Generated State Without Committing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run full CI
        run: pnpm run ci
      - name: Upload generated data artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: generated-data-${{ github.sha }}
          path: |
            data/*.json
            CONTEXT.md
            content/**/_index.md
            content/**/_registry.md
          retention-days: 14
