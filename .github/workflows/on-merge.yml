name: Post-Merge Verification

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'schemas/**'
      - 'scripts/**'
      - 'TAXONOMY.md'
      - 'package.json'
      - 'pnpm-lock.yaml'

concurrency:
  group: post-merge-verification-main
  cancel-in-progress: true

jobs:
  verify-generated-state:
    name: Verify Generated State Without Committing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
      - name: Upload generated data artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-data-${{ github.sha }}
          path: |
            data/*.json
            CONTEXT.md
            content/**/_index.md
            content/**/_registry.md
          retention-days: 14
