name: Post-Merge Verification

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'schemas/**'
      - 'scripts/**'
      - 'TAXONOMY.md'
      - 'package.json'
      - 'pnpm-lock.yaml'

concurrency:
  group: post-merge-verification-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-generated-state:
    name: Verify Generated State Without Committing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run full CI
        run: pnpm run ci
      - name: Upload generated data artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-data-${{ github.sha }}
          path: |
            data/*.json
            CONTEXT.md
            content/**/_index.md
            content/**/_registry.md
          retention-days: 14
